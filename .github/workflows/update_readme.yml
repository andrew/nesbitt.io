name: Update README

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions: {}

concurrency:
  group: update-readme
  cancel-in-progress: true

jobs:
  update:
    name: Update README
    runs-on: ubuntu-latest
    permissions:
      contents: write # push changes
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false

      - uses: ruby/setup-ruby@6e5d382445ae5590b7449d8b3bc8cb1c2c27f617 # v1.317.0
        with:
          ruby-version: '3.4'

      - name: Update README
        run: rake readme

      - name: Commit changes
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          if ! git diff --quiet; then
            git add README.md
            git commit -m 'Update README with recent posts'
            git push "https://x-access-token:${GH_TOKEN}@github.com/${REPO}" HEAD
          fi
