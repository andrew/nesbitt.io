name: Update Feeds

on:
  schedule:
    - cron: '17 * * * *'
  workflow_dispatch:

permissions: {}

concurrency:
  group: update-feeds
  cancel-in-progress: true

jobs:
  update:
    name: Update Feeds
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          persist-credentials: false

      - uses: ruby/setup-ruby@12fd324f1d0b43274fdc8130f6980590a667c455 # v1.312.0
        with:
          bundler-cache: true

      - name: Fetch feeds
        run: bundle exec ruby _twipm/fetch_feeds.rb --days 30

      - name: Commit changes
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          if ! git diff --quiet _data/feeds.json; then
            git add _data/feeds.json
            git commit -m 'Update feeds'
            git push "https://x-access-token:${GH_TOKEN}@github.com/${REPO}" HEAD:master
          fi
