name: Update Feeds

on:
  schedule:
    - cron: '17 * * * *'
  workflow_dispatch:

permissions: {}

concurrency:
  group: update-feeds
  cancel-in-progress: true

jobs:
  update:
    name: Update Feeds
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false

      - uses: ruby/setup-ruby@8e41b362d2589a22a44c1cfa214b3c83052c195b # v1.318.0
        with:
          bundler-cache: true

      - name: Fetch feeds
        run: bundle exec ruby _twipm/fetch_feeds.rb --days 30

      - name: Commit changes
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          if ! git diff --quiet _data/feeds.json; then
            git add _data/feeds.json
            git commit -m 'Update feeds'
            git push "https://x-access-token:${GH_TOKEN}@github.com/${REPO}" HEAD:master
          fi
