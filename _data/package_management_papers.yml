    authors: Chenyang Wang, Rongxin Wu, Haoran Song, Junjie Shu, Guozhu Li
    venue: IEEE/ACM International Conference on Automated Software Engineering (ASE)
    notes: Highlights issues related to inefficiency and excessive resource usage by dependency resolution strategies in Python, proposing improved resolution approach.
