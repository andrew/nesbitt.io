      arxiv: '2407.00246'
  - title: 'Maven-Hijack: Software Supply Chain Attack Exploiting Packaging Order'
    url: https://arxiv.org/abs/2407.18760
    archive_url: https://web.archive.org/web/20251216155450/http://arxiv.org/abs/2407.18760
