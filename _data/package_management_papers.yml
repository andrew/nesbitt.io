    venue: IEEE International Conference on Software Analysis, Evolution and Reengineering (SANER)
    notes: Four-month field study with developers of 400 popular Java libraries. Found breaking changes are mostly motivated by implementing new features, simplifying APIs, and improving maintainability. Developers rarely deprecate elements before changes due to maintenance overhead.
