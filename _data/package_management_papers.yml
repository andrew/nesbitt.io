    ids:
      doi: 10.1145/3377811.3380426
  - title: 'smartpip: A smart approach to resolving python dependency conflict issues'
    url: https://dl.acm.org/doi/10.1145/3551349.3560437
    archive_url: http://web.archive.org/web/20250531100002/https://dl.acm.org/doi/10.1145/3551349.3560437
