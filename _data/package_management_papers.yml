---
sections:
- id: package-management-security
  title: Package Management Security
  description: Research on security vulnerabilities, attack vectors, and defense mechanisms in package management systems.
  papers:
  - title: 'A Look in the Mirror: Attacks on Package Managers'
    url: https://dl.acm.org/doi/10.1145/1455770.1455841
    archive_url: http://web.archive.org/web/20241117111626/https://dl.acm.org/doi/10.1145/1455770.1455841
    year: '2008'
    authors: Justin Cappos, Justin Samuel, Scott Baker, John H. Hartman
    venue: ACM Conference on Computer and Communications Security (CCS)
    notes: |-
      Seminal paper analyzing ten popular package managers (APT, YUM, YaST, Portage) discovering vulnerabilities in all systems exploitable by man-in-the-middle attackers or malicious mirrors. Demonstrated attackers controlling mirrors could compromise hundreds to thousands of clients weekly. Identified replay attacks, freeze attacks, extraneous dependencies attacks, and endless data attacks while proposing a layered security approach.

      A broader, more "textbook" analysis of these attacks is also available in [a technical report](https://www2.cs.arizona.edu/people/jsamuel/papers/TR08-02.pdf) by the authors.  This further fleshes out a host of related attacks that rely on manipulation of dependency information by mirrors to cause package resolution to behave in ways that harm security or stability.
    ids:
      doi: 10.1145/1455770.1455841
  - title: Package Managers Still Vulnerable
    url: https://www.usenix.org/publications/login/february-2009-volume-34-number-1/package-managers-still-vulnerable
    archive_url: http://web.archive.org/web/20260126214140/https://www.usenix.org/publications/login/february-2009-volume-34-number-1/package-managers-still-vulnerable
    year: '2009'
    authors: Justin Samuel, Justin Cappos
    venue: ";login: The USENIX Magazine"
    notes: Follow-up analysis examining how package managers responded to disclosed vulnerabilities, finding that while some (YaST, APT) made improvements, many remained vulnerable to replay, freeze, and endless data attacks.
  - title: 'Secure Software Updates: Disappointments and New Challenges'
    url: https://www.usenix.org/legacy/events/hotsec06/tech/full_papers/bellissimo/bellissimo.pdf
    archive_url: http://web.archive.org/web/20241209195604/https://www.usenix.org/legacy/events/hotsec06/tech/full_papers/bellissimo/bellissimo.pdf
    year: '2006'
    authors: Anthony Bellissimo, John Burgess, Kevin Fu
    venue: USENIX Workshop on Hot Topics in Security (HotSec)
    notes: Early analysis of popular software update mechanisms demonstrating that despite research progress, deployed systems relied on trusted networks and were susceptible to man-in-the-middle attacks. Examining McAfee VirusScan, Mozilla Firefox, and Windows Update, the study found none properly authenticated connections.  While technically not package manager research, this work demonstrated that security was lacking in the general space of software update systems.
  - title: 'Mercury: Bandwidth-Effective Prevention of Rollback Attacks Against Community Repositories'
    url: https://www.usenix.org/conference/atc17/technical-sessions/presentation/kuppusamy
    archive_url: http://web.archive.org/web/20251221202931/https://www.usenix.org/conference/atc17/technical-sessions/presentation/kuppusamy
    year: '2017'
    authors: Trishank Kuppusamy, Vladimir Diaz, Justin Cappos
    venue: USENIX Annual Technical Conference (USENIX ATC)
    notes: Presented bandwidth-efficient techniques for preventing rollback attacks on package repositories in a way that scales to very large software repositories, such as PyPI.  The techniques described here reduce metadata overhead by 95% compared to standard TUF while maintaining security properties. Using delta compression, Mercury achieves about 3.5% of average package size per month for PyPI users.
  - title: 'Artemis: Defanging Software Supply Chain Attacks in Multi-repository Update Systems'
    url: https://ssl.engineering.nyu.edu/papers/moore_artemis_2023.pdf
    archive_url: http://web.archive.org/web/20251205123106/https://ssl.engineering.nyu.edu/papers/moore_artemis_2023.pdf
    year: '2023'
    authors: Marina Moore, Trishank Kuppusamy, Justin Cappos
    venue: Annual Computer Security Applications Conference (ACSAC)
    notes: Discusses ways to securely use multiple repositories with a package manager.  This includes a mechanism to 1) blocking or pinning a repository name to a specific repository, 2) a means for multiple parties to have different package namespaces on the same repository, and 3) a means to require a threshold of approvers for all of these operations. This paper presents lessons learned both from deployments of [Uptane](https://ssl.engineering.nyu.edu/papers/kuppusamy_escar_16.pdf) (the automotive variant of TUF which is widely used in automotive) and other TUF deployments across millions of devices.
  - title: 'Small World with High Risks: A Study of Security Threats in the npm Ecosystem'
    url: https://www.usenix.org/conference/usenixsecurity19/presentation/zimmerman
    archive_url: http://web.archive.org/web/20260101112303/https://www.usenix.org/conference/usenixsecurity19/presentation/zimmerman
    year: '2019'
    authors: Markus Zimmermann, Cristian-Alexandru Staicu, Cam Tenny, Michael Pradel
    venue: USENIX Security Symposium
    notes: Systematically analyzed dependencies, maintainers, and security issues in npm, finding that 20 maintainers can reach more than half the ecosystem and two-thirds of advisories remain unpatched. Demonstrated small-world network properties create concentrated security risks.
  - title: The impact of security vulnerabilities in the npm package dependency network
    url: https://dl.acm.org/doi/10.1145/3196398.3196401
    archive_url: http://web.archive.org/web/20250518070420/https://dl.acm.org/doi/10.1145/3196398.3196401
    year: '2018'
    authors: Alexandre Decan, Tom Mens, Eleni Constantinou
    venue: International Conference on Mining Software Repositories (MSR)
    notes: Analyzed propagation of security vulnerabilities through npm dependency network, studying how vulnerabilities affect downstream packages and the time required for ecosystem-wide fixes.
    ids:
      doi: 10.1145/3196398.3196401
  - title: Demystifying the vulnerability propagation and its evolution via dependency trees in the npm ecosystem
    url: https://dl.acm.org/doi/10.1145/3510003.3510142
    archive_url: http://web.archive.org/web/20250531100002/https://dl.acm.org/doi/10.1145/3510003.3510142
    year: '2022'
    authors: Chengwei Liu, Sen Chen, Lingling Fan, Bihuan Chen, Yang Liu, Xin Peng
    venue: IEEE/ACM International Conference on Software Engineering (ICSE)
    notes: Analyzes vulnerability propagation within dependency trees by applying npm-specific dependency resolution rules, recommending lockfiles for managing dependencies.
    ids:
      doi: 10.1145/3510003.3510142
  - title: Empirical Analysis of Security Vulnerabilities in Python Packages
    url: https://ieeexplore.ieee.org/document/9678615
    archive_url: http://web.archive.org/web/20250416013926/https://ieeexplore.ieee.org/document/9678615/
    year: '2021'
    authors: Various authors
    venue: IEEE conference proceedings
    notes: Analysis of 550 vulnerability reports affecting 252 Python packages in PyPI ecosystem, providing empirical evidence about vulnerability patterns in Python packages.
  - title: Surviving Software Dependencies
    url: https://dl.acm.org/doi/10.1145/3329781.3344149
    year: '2019'
    authors: Russ Cox
    venue: ACM Queue
    notes: Influential essay on managing software dependencies at scale. Discusses version selection, minimum version selection (used in Go), and the tradeoffs between different dependency management approaches. Required reading for anyone working on package managers.
    ids:
      doi: 10.1145/3329781.3344149
  - title: The Impact of Regular Expression Denial of Service (ReDoS) in Practice
    url: https://dl.acm.org/doi/10.1145/3236024.3236027
    archive_url: https://web.archive.org/web/20210416093951/https://ieeexplore.ieee.org/document/9403390
    year: '2018'
    authors: James Davis, Christy Coghlan, Francisco Servant, Dongyoon Lee
    venue: ACM Joint European Software Engineering Conference and Symposium on the Foundations of Software Engineering (ESEC/FSE) - Distinguished Paper Award
    notes: Ecosystem-scale study of ReDoS vulnerabilities in npm and PyPI. Found thousands of super-linear regexes affecting over 10,000 modules. 93% of vulnerable regexes are polynomial rather than exponential, missed by common detection tools.
    ids:
      doi: 10.1145/3236024.3236027
  - title: 'Thou Shalt Not Depend on Me: Analysing the Use of Outdated JavaScript Libraries on the Web'
    url: https://www.ndss-symposium.org/wp-content/uploads/2017/09/ndss2017_02B-1_Lauinger_paper.pdf
    archive_url: http://web.archive.org/web/20240916155726/https://www.ndss-symposium.org/wp-content/uploads/2017/09/ndss2017_02B-1_Lauinger_paper.pdf
    year: '2017'
    authors: Tobias Lauinger, Abdelberi Chaabane, Sajjad Arshad, William Robertson, Christo Wilson, Engin Kirda
    venue: Network and Distributed System Security Symposium (NDSS)
    notes: First comprehensive study of client-side JavaScript library usage across 133K websites. Found 37% include at least one library with a known vulnerability. Median site uses library versions released 1,177 days before newest available release.
- id: lockfiles
  title: Lockfiles
  description: Research on lockfile design, usage, and their role in dependency management.
  papers:
  - title: The Design Space of Lockfiles Across Package Managers
    url: https://arxiv.org/pdf/2505.04834
    archive_url: http://web.archive.org/web/20251210090521/https://arxiv.org/pdf/2505.04834
    year: '2025'
    authors: Yogya Gamage, Deepika Tiwari, Martin Monperrus, Benoit Baudry
    venue: arXiv preprint
    notes: First study of lockfiles across seven package managers (npm, pnpm, Cargo, Poetry, Pipenv, Gradle, Go). Analyzes lockfile content and lifecycle differences, finding Go has near 100% lockfile commit rate while Gradle is close to zero. Interviews with 15 developers reveal benefits (build determinism, integrity verification, transparency) and challenges (readability, delayed updates, library locking). Recommends generating lockfiles by default and committing them for all projects.
    ids:
      arxiv: '2505.04834'
  - title: 'Reproducible builds: Increasing the integrity of software supply chains'
    url: https://ieeexplore.ieee.org/document/9403390
    archive_url: http://web.archive.org/web/20250415120641/https://ieeexplore.ieee.org/document/9648644/
    year: '2022'
    authors: Chris Lamb, Stefano Zacchiroli
    venue: IEEE Software
    notes: Overview of the reproducible builds movement and its importance for software supply chain security. Discusses how bit-for-bit reproducibility enables independent verification of build artifacts.
  - title: 'It''s Like Flossing Your Teeth: On the Importance and Challenges of Reproducible Builds for Software Supply Chain Security'
    url: https://ieeexplore.ieee.org/abstract/document/10179320
    archive_url: http://web.archive.org/web/20240415165128/https://ieeexplore.ieee.org/abstract/document/10179320
    year: '2023'
    authors: Marcel Fourné, Dominik Wermke, William Enck, Sascha Fahl, Yasemin Acar
    venue: IEEE Symposium on Security and Privacy (S&P)
    notes: 24 semi-structured interviews with Reproducible-Builds.org participants. Found self-effective work by highly motivated developers and collaborative communication with upstream projects are key to achieving reproducible builds. Identifies path for R-Bs to become commonplace.
  - title: Investigating the reproducibility of npm packages
    url: https://ieeexplore.ieee.org/document/9240695
    archive_url: http://web.archive.org/web/20201210163152/https://ieeexplore.ieee.org/document/9240695
    year: '2020'
    authors: Pronnoy Goswami, Saksham Gupta, Zhiyuan Li, Na Meng, Daphne Yao
    venue: IEEE International Conference on Software Maintenance and Evolution (ICSME)
    notes: Empirical study of npm package reproducibility, analyzing factors that affect whether packages can be rebuilt identically from source.
  - title: 'Pinning is futile: You need more than local dependency versioning to defend against supply chain attacks'
    url: https://arxiv.org/abs/2502.06662
    archive_url: http://web.archive.org/web/20260127103135/https://arxiv.org/abs/2502.06662
    year: '2025'
    authors: Hao He, Bogdan Vasilescu, Christian Kästner
    venue: arXiv preprint
    notes: Study finding that local pinning leads to more security vulnerabilities due to bloated and outdated dependencies. Suggests risk of malicious package updates can be reduced when core dependencies pin their versions and keep them updated regularly.
    ids:
      arxiv: '2502.06662'
  - title: Causes and Canonicalization of Unreproducible Builds in Java
    url: https://arxiv.org/abs/2504.21679
    archive_url: https://web.archive.org/web/20260109164548/https://arxiv.org/abs/2504.21679
    year: '2025'
    authors: Aman Sharma, Benoit Baudry, Martin Monperrus
    venue: IEEE Transactions on Software Engineering
    notes: Develops a taxonomy of six root causes of build unreproducibility in Java and presents Chains-Rebuild, a canonicalization tool that raises reproducibility success from 9.48% to 26.89% on 12,283 unreproducible artifacts. Studies mitigations including artifact and bytecode canonicalization.
    ids:
      arxiv: '2504.21679'
  - title: 'Maven-Lockfile: High Integrity Rebuild of Past Java Releases'
    url: https://arxiv.org/abs/2510.00730
    archive_url: http://web.archive.org/web/20260126214427/https://arxiv.org/abs/2510.00730
    year: '2025'
    authors: Larissa Schmid, et al.
    venue: arXiv preprint
    notes: Addresses Maven's lack of native lockfile support. Presents Maven-Lockfile to generate and update lockfiles capturing all direct and transitive dependencies with checksums. Enables high integrity builds and can detect tampered artifacts.
    ids:
      arxiv: '2510.00730'
  - title: Does Functional Package Management Enable Reproducible Builds at Scale? Yes.
    url: https://arxiv.org/abs/2501.15919
    archive_url: http://web.archive.org/web/20251222083827/https://arxiv.org/abs/2501.15919
    year: '2025'
    authors: Julien Malka, Stefano Zacchiroli, Théo Zimmermann
    venue: International Conference on Mining Software Repositories (MSR) - Distinguished Paper Award
    notes: First large-scale study of bitwise reproducibility in Nix, rebuilding 709,816 packages from historical snapshots of nixpkgs sampled between 2017 and 2023. Achieved reproducibility rates between 69% and 91% with an upward trend, and rebuildability rates over 99%. Found about 15% of unreproducibility failures are due to embedded build dates. Released a dataset with build statuses, logs, and recursive diffs showing where unreproducible artifacts differ.
    ids:
      arxiv: '2501.15919'
  - title: 'Improving Reproducibility of Scientific Software Using Nix/NixOS: A Case Study on the preCICE Ecosystem'
    url: https://eceasst.org/index.php/eceasst/article/view/2613
    archive_url: http://web.archive.org/web/20250620075104/https://eceasst.org/index.php/eceasst/article/view/2613
    year: '2025'
    authors: Max Hausch, Simon Hauser, Benjamin Uekermann
    venue: Electronic Communications of the EASST
    notes: Case study applying Nix to scientific software reproducibility in the preCICE coupling library ecosystem. Demonstrates how functional package management provides guarantees that packages and their dependencies can be built reproducibly, addressing challenges in computational science where results must be independently verifiable.
  - title: 'Lila: Decentralized Build Reproducibility Monitoring for the Functional Package Management Model'
    url: https://arxiv.org/abs/2601.20662
    year: '2026'
    authors: Julien Malka, Arnout Engelen
    venue: arXiv preprint
    notes: Proposes Lila, a decentralised monitor for bit-for-bit reproducibility of artifacts built under functional package managers like Nix and Guix. Independent builders publish attestations to a shared log so divergences in distributed binaries can be detected without trusting any single rebuilder.
    ids:
      arxiv: '2601.20662'
      doi: 10.48550/arXiv.2601.20662
- id: dependency-resolution-algorithms-and-challenges
  title: Dependency Resolution Algorithms and Challenges
  description: Research establishing the theoretical complexity of dependency resolution and practical solutions.
  papers:
  - title: 'EDOS deliverable WP2-D2.1: Report on Formal Management of Software Dependencies'
    url: https://www.researchgate.net/publication/278629134_EDOS_deliverable_WP2-D21_Report_on_Formal_Management_of_Software_Dependencies
    year: '2005'
    authors: Roberto Di Cosmo
    venue: INRIA Technical Report
    notes: |-
      First document to show that the package installation problem is NP-complete. First to
      show a 3SAT encoding for Debian and RPM solves. Compares package constraint languages
      and proposes improvements for metadata.
  - title: 'OPIUM: Optimal Package Install/Uninstall Manager'
    url: https://cseweb.ucsd.edu/~lerner/papers/opium.pdf
    archive_url: http://web.archive.org/web/20250920063707/https://cseweb.ucsd.edu/~lerner/papers/opium.pdf
    year: '2007'
    authors: Chris Tucker, David Shuffelton, Ranjit Jhala, Sorin Lerner
    venue: International Conference on Software Engineering (ICSE)
    notes: Introduced complete dependency solver using SAT, pseudo-boolean optimization, and Integer Linear Programming. OPIUM guarantees completeness and optimizes user-defined objectives. Demonstrated 23.3% of Debian users encounter apt-get's incompleteness failures.
  - title: Automated dependency resolution for open source software
    url: https://ieeexplore.ieee.org/document/5463346
    archive_url: http://web.archive.org/web/20250423181704/https://ieeexplore.ieee.org/document/5463346/
    year: '2010'
    authors: Joel Ossher, Sushil Bajracharya, Cristina Lopes
    venue: IEEE Working Conference on Mining Software Repositories (MSR)
    notes: Proposed techniques for automatically resolving dependencies in open source projects by mining and analyzing source code repositories, addressing challenges when dependency metadata is incomplete or unavailable.
  - title: Handling software upgradeability problems with MILP solvers
    url: https://doi.org/10.4204/EPTCS.29.1
    year: '2010'
    authors: Claude Michel, Michel Rueher
    venue: International Workshop on Logics for Component Configuration (LoCoCo)
    notes: Demonstrated how Mixed Integer Linear Programming solvers can handle package upgradeability problems, offering an alternative to SAT-based approaches with different performance characteristics.
    ids:
      doi: 10.4204/EPTCS.29.1
  - title: Solving Linux Upgradeability Problems Using Boolean Optimization
    url: https://doi.org/10.4204/EPTCS.29.2
    year: '2010'
    authors: Josep Argelich, Daniel Le Berre, Inês Lynce, João P. Marques Silva, Pascal Rapicault
    venue: International Workshop on Logics for Component Configuration (LoCoCo)
    notes: Applied pseudo-boolean optimization techniques to Linux package upgradeability, showing how boolean optimization can find optimal solutions while respecting user preferences.
    ids:
      doi: 10.4204/EPTCS.29.2
  - title: 'Dependency solving: A separate concern in component evolution management'
    url: https://www.sciencedirect.com/science/article/abs/pii/S0164121212000477
    archive_url: http://web.archive.org/web/20240918233216/https://www.sciencedirect.com/science/article/abs/pii/S0164121212000477
    year: '2012'
    authors: Pietro Abate, Roberto Di Cosmo, Ralf Treinen, Stefano Zacchiroli
    venue: Journal of Systems and Software (JSS)
    notes: Argued for modular package manager architecture where dependency solving separates from other concerns. Reviewed state-of-the-art package managers and proposed generic external solvers (SAT, PBO, MILP) rather than ad-hoc heuristics.
  - title: Modelling and Resolving Software Dependencies
    url: https://www.researchgate.net/publication/229012671_Modelling_and_resolving_software_dependencies
    year: '2005'
    authors: Daniel Burrows
    venue: Technical Report
    notes: Presented abstract model of dependency relationships and restartable best-first-search technique for dependency resolution. Documents theoretical approach behind aptitude's problem resolver.
  - title: Dependency Solving Is Still Hard, but We Are Getting Better at It
    url: https://arxiv.org/abs/2011.07851
    archive_url: http://web.archive.org/web/20251208110940/https://arxiv.org/abs/2011.07851
    year: '2020'
    authors: Pietro Abate, Roberto Di Cosmo, Georgios Gousios, Stefano Zacchiroli
    venue: IEEE International Conference on Software Analysis, Evolution and Reengineering (SANER)
    notes: Retrospective analysis conducting census of dependency solving capabilities in state-of-the-art package managers, showing SAT-based approaches are gaining adoption. Demonstrated that despite NP-completeness, practical solvers perform well on real-world instances.
    ids:
      arxiv: '2011.07851'
  - title: 'aspcud: A Linux Package Configuration Tool Based on Answer Set Programming'
    url: https://doi.org/10.4204/EPTCS.65.2
    year: '2011'
    authors: Martin Gebser, Roland Kaminski, Torsten Schaub
    venue: Electronic Proceedings in Theoretical Computer Science
    notes: Introduced aspcud, a dependency solver using Answer Set Programming rather than SAT or MILP. Demonstrates ASP as a viable alternative for package configuration, with declarative specification of optimization criteria and competitive performance on Debian package problems.
    ids:
      doi: 10.4204/EPTCS.65.2
  - title: On software component co-installability
    url: https://dl.acm.org/doi/10.1145/2025113.2025149
    year: '2011'
    authors: Roberto Di Cosmo, Jérôme Vouillon
    venue: SIGSOFT Symposium on the Foundations of Software Engineering (FSE)
    notes: Addressed fundamental challenge of determining which software components can be installed together, developing formal framework with graph-theoretic transformations to simplify dependency repositories while preserving co-installability properties.
    ids:
      doi: 10.1145/2025113.2025149
  - title: Strong dependencies between software components
    url: https://dl.acm.org/doi/10.1109/ESEM.2009.5314231
    archive_url: http://web.archive.org/web/20240411232341/https://dl.acm.org/doi/10.1109/ESEM.2009.5314231
    year: '2009'
    authors: Pietro Abate, Roberto Di Cosmo, Jaap Boender, Stefano Zacchiroli
    venue: ACM/IEEE International Symposium on Empirical Software Engineering and Measurement (ESEM)
    notes: Studied strong dependency relationships where packages are tightly coupled, analyzing patterns of mandatory co-installation and implications for system evolution.
    ids:
      doi: 10.1109/ESEM.2009.5314231
  - title: 'Watchman: Monitoring dependency conflicts for python library ecosystem'
    url: https://dl.acm.org/doi/10.1145/3377811.3380426
