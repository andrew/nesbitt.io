    notes: Demonstrates a supply chain attack exploiting how Maven packages dependencies and how the JVM resolves classes at runtime. By injecting a malicious class with the same fully qualified name into a dependency packaged earlier, an attacker can silently override application behavior. Demonstrated on the Corona-Warn-App.
    ids:
      arxiv: '2407.18760'
  - title: 'GoSurf: Identifying Software Supply Chain Attack Vectors in Go'
