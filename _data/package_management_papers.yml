    venue: ACM Workshop on Software Supply Chain Offensive Research and Ecosystem Defenses (SCORED)
    notes: 'Systematized knowledge about secure software supply chain patterns, identifying four stages of supply chain attacks and proposing three security properties: transparency, validity, and separation.'
