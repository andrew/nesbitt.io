      doi: 10.1145/3551349.3560437
  - title: 'ConflictJS: Finding and understanding conflicts between javascript libraries'
    url: https://dl.acm.org/doi/10.1145/3180155.3180184
    archive_url: http://web.archive.org/web/20250802213305/https://dl.acm.org/doi/10.1145/3180155.3180184
    year: '2018'
    authors: Jibesh Patra, Pooja N. Dixit, Michael Pradel
    venue: IEEE/ACM International Conference on Software Engineering (ICSE)
