      doi: 10.1145/3180155.3180184
  - title: Could I Have a Stack Trace to Examine the Dependency Conflict Issue?
    url: https://doi.org/10.1109/ICSE.2019.00068
    year: '2019'
    authors: Ying Wang, Ming Wen, Rongxin Wu, Zhenwei Liu, Shin Hwei Tan, Zhiliang Zhu, Hai Yu, Shing-Chi Cheung
    venue: IEEE/ACM International Conference on Software Engineering (ICSE)
