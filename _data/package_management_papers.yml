    notes: Proposes a taxonomy of 12 attack vectors specific to Go's package lifecycle, identifying language features that can be misused to propagate malicious code through supply chains. Introduces GoSurf, a static analysis tool that measures the attack surface of Go packages according to this taxonomy, evaluated on the top 500 most imported Go modules.
