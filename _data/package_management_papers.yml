    authors: Todd Gamblin, Massimiliano Culpo, Gregory Becker, Sergei Shudler
    venue: Supercomputing
    notes: 'Describes the ASP encoding used for Spack''s dependency solver: how to model versions, variants, and dependencies. Also describes how to structure optimization criteria to mix source and binary builds by reusing existing installations/build caches (if they''re compatible).'
    ids:
      doi: 10.5555/3571885.3571931
  - title: Bridging the Gap Between Binary and Source Based Package Management in Spack
    url: https://dl.acm.org/doi/10.1145/3712285.3759791
    year: '2025'
    authors: John Gouwar, Greg Becker, Tamara Dahlgren, Nathan Hanford, Arjun Guha, and Todd Gamblin
    venue: Supercomputing
    notes: |-
      Discusses some differences beteween source and binary package solving. Describes how to
      avoid the rigid ABI requirements of Spack's (and Nix's and Guix's) hashing model and not
      rebuild the world when an ABI-stable package like zlib changes, while preserving
      reproducibility for mixed (or "impure" in nix-speak) installations.
    ids:
      doi: 10.1145/3712285.3759791
  - title: 'Package Managers à la Carte: A Formal Model of Dependency Resolution'
    url: https://arxiv.org/abs/2602.18602
    year: '2026'
    authors: Ryan Gibb, Patrick Ferris, David N. Allsopp, Thomas Gazagnaire, Anil Madhavapeddy
    venue: arXiv preprint
    notes: Follow-up to the HyperRes hypergraph dependency resolver. Introduces the Package Calculus, a formalism aiming to capture dependency resolution semantics across language and OS package managers as parameterised variants of a single core. Targets multilingual projects whose external system and hardware dependencies fall through gaps between existing package managers.
    ids:
      arxiv: '2602.18602'
      doi: 10.48550/arxiv.2602.18602
  - title: 'Breaking the Dependency Chaos: A Constraint-Driven Python Dependency Resolution Strategy with Selective LLM Imputation'
    url: https://arxiv.org/abs/2605.11772
    year: '2026'
    authors: Kowshik Chowdhury, Dipayan Banik, Shazibul Islam Shamim
    venue: arXiv preprint
    notes: Tackles Python dependency resolution where missing metadata, Python 2/3 incompatibilities, and deprecated packages make pure SAT-style solvers fail. Combines constraint solving with LLM-based imputation only for the genuinely missing version information, rather than treating the whole problem as LLM inference like prior work (PLLM).
    ids:
      arxiv: '2605.11772'
      doi: 10.48550/arxiv.2605.11772
- id: software-supply-chain-security
  title: Software Supply Chain Security
  description: Research on supply chain attacks, detection methods, and prevention frameworks.
