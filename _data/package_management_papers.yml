    venue: IEEE European Symposium on Security and Privacy Workshops (Euro S&P)
    notes: Studies typosquatting and combosquatting attacks on PyPI. Combosquatting exploits mistakes in the order of package names consisting of multiple nouns (e.g., "python-nmap" typed as "nmap-python"). Proposes automated approach to identify combosquatting and typosquatting package names.
  - title: Practical Automated Detection of Malicious npm Packages
    url: https://dl.acm.org/doi/10.1145/3510003.3510104
