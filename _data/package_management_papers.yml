  description: Recent research on how large language models hallucinate non-existent packages, creating new supply chain attack vectors.
  papers:
  - title: We Have a Package for You! An Analysis of Package Hallucinations by Code Generating LLMs
    url: https://arxiv.org/abs/2406.10279
    archive_url: http://web.archive.org/web/20251209183818/https://arxiv.org/abs/2406.10279
    year: '2024'
    authors: Multiple authors from University of Texas at San Antonio, Virginia Tech, University of Oklahoma
    venue: arXiv preprint | [GitHub](https://github.com/Spracks/PackageHallucination)
    notes: Analysis using 16 popular LLMs and 2 prompt datasets for Python and JavaScript code generation, producing 576,000 code samples. Found 440,445 (19.7%) were hallucinations, including 205,474 unique non-existent packages. Average hallucination rate of 5.2% for commercial models and 21.7% for open-source models. Demonstrates how attackers can exploit LLM hallucinations by registering fake packages.
    ids:
      arxiv: '2406.10279'
  - title: 'Importing Phantoms: Measuring LLM Package Hallucination Vulnerabilities'
    url: https://arxiv.org/abs/2501.19012
    archive_url: http://web.archive.org/web/20260126221647/https://arxiv.org/abs/2501.19012
    year: '2025'
    authors: Arjun Krishna, Erick Galinkin, Leon Derczynski, Jeffrey Martin
    venue: arXiv preprint
    notes: Examines package hallucinations across multiple programming languages (Python, JavaScript, Rust) for different tasks across different LLMs. Found package hallucination rate depends on model choice, programming language, model size, and task specificity. Discovered inverse correlation between package hallucination rate and HumanEval coding benchmark. Shows coding models are not being optimized for secure code generation.
    ids:
      arxiv: '2501.19012'
  - title: 'HFuzzer: Testing Large Language Models for Package Hallucinations via Phrase-based Fuzzing'
    url: https://arxiv.org/abs/2509.23835
    archive_url: http://web.archive.org/web/20251207144536/https://arxiv.org/abs/2509.23835
    year: '2025'
    authors: Multiple authors
    venue: arXiv preprint
    notes: First framework to introduce fuzzing into testing LLMs for package hallucinations. Adopts phrase-based fuzzing to guide models to generate diverse coding tasks. Triggers package hallucinations across all tested models. Identifies 2.60× more unique hallucinated packages compared to mutational fuzzing frameworks. Found 46 unique hallucinated packages when testing GPT-4o.
    ids:
      arxiv: '2509.23835'
  - title: 'AI-Induced Supply-Chain Compromise: A Systematic Review of Package Hallucinations and Slopsquatting Attacks'
    url: https://www.researchsquare.com/article/rs-8007192/v1
    year: '2025'
    authors: Multiple authors
    venue: Research Square preprint
    notes: Systematic review of package hallucinations and slopsquatting attacks where malicious actors exploit LLMs' tendency to generate non-existent package names. Coined term "slopsquatting" by security researcher Seth Larson. Analyzes how adversaries can register hallucinated package names in public registries with malware payloads.
  - title: An Empirical Study of Vulnerable Package Dependencies in LLM Repositories
    url: https://arxiv.org/abs/2508.21417
    archive_url: http://web.archive.org/web/20251215012832/https://arxiv.org/abs/2508.21417
    year: '2025'
    authors: Multiple authors
    venue: arXiv preprint
    notes: Empirical analysis of 52 open-source LLMs examining third-party dependencies and vulnerabilities. Found half of vulnerabilities in LLM ecosystem remain undisclosed for more than 56.2 months, and 75.8% of LLMs include vulnerable dependencies. GitHub's Top 100 AI projects reference on average 208 direct and transitive dependencies, with 15% containing 10+ known vulnerabilities.
    ids:
      arxiv: '2508.21417'
  - title: 'The Hidden Risks of LLM-Generated Web Application Code: A Security-Centric Evaluation'
    url: https://arxiv.org/abs/2504.20612
    archive_url: http://web.archive.org/web/20251216144526/https://arxiv.org/abs/2504.20612
    year: '2025'
    authors: Multiple authors
    venue: arXiv preprint
    notes: Security evaluation of LLM-generated web application code finding over 40% of AI-generated solutions contain security flaws. Common issues include missing input sanitization, authentication mechanism vulnerabilities, and dependency overuse that expands attack surface.
    ids:
      arxiv: '2504.20612'
  - title: 'Large Language Models and Code Security: A Systematic Literature Review'
    url: https://arxiv.org/abs/2412.15004
    archive_url: http://web.archive.org/web/20251205123241/https://arxiv.org/abs/2412.15004
    year: '2024'
    authors: Multiple authors
    venue: arXiv preprint
    notes: Systematic literature review examining LLMs in code security, covering vulnerabilities to remediation approaches. Analyzes common security vulnerabilities in AI-generated code across multiple languages and models.
    ids:
      arxiv: '2412.15004'
  - title: 'The Range Shrinks, the Threat Remains: Re-evaluating LLM Package Hallucinations on the 2026 Frontier-Model Cohort'
    url: https://arxiv.org/abs/2605.17062
    year: '2026'
    authors: Aleksandr Churilov
    venue: arXiv preprint
    notes: Replicates Spracklen et al. (USENIX Security '25) on five frontier code models released between October 2025 and March 2026, including Claude Sonnet 4.6, Claude Haiku 4.5, and GPT-5.4-mini. Finds the commercial-vs-open hallucination gap has narrowed substantially but the absolute slopsquatting attack surface remains non-trivial.
    ids:
      arxiv: '2605.17062'
      doi: 10.48550/arxiv.2605.17062
  - title: 'PackMonitor: Enabling Zero Package Hallucinations Through Decoding-Time Monitoring'
    url: https://arxiv.org/abs/2602.20717
    year: '2026'
    authors: Xiting Liu, Yuetong Liu, Yitong Zhang, Jia Li, Shi-Min Hu
    venue: arXiv preprint
    notes: Intercepts package-name generation at decoding time and checks each candidate against the live registry before letting the model commit to it. Reports a zero-hallucination rate on the studied benchmark by treating package name choice as a constrained-decoding problem rather than a post-hoc detection one.
    ids:
      arxiv: '2602.20717'
      doi: 10.48550/arxiv.2602.20717
  - title: 'Correct Code, Vulnerable Dependencies: A Large Scale Measurement Study of LLM-Specified Library Versions'
    url: https://arxiv.org/abs/2605.06279
    year: '2026'
    authors: Chengjie Wang, Jingzheng Wu, Xiang Ling, Tianyue Luo, Chen Zhao
    venue: arXiv preprint
    notes: First measurement study of the version identifiers LLMs write into import statements. Evaluates ten models against PinTrace, a benchmark of 1,000 Stack Overflow snippets, and shows that even when the code is correct the pinned version is often vulnerable or incompatible with the runtime.
    ids:
      arxiv: '2605.06279'
      doi: 10.48550/arxiv.2605.06279
