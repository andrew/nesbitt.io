    year: '2022'
    authors: Adriana Sejfia, Max Schäfer
    venue: IEEE/ACM International Conference on Software Engineering (ICSE)
    notes: Presents Amalfi, combining ML classifiers, a reproducer for identifying packages rebuildable from source, and a clone detector for known malicious packages. Identified 95 previously unknown malicious packages over seven days. Found malicious packages more likely to contain minified code or binaries.
    ids:
      doi: 10.1145/3510003.3510104
  - title: 'TypoSmart: A Low False-Positive System for Detecting Malicious and Stealthy Typosquatting Threats in Package Registries'
    url: https://arxiv.org/html/2502.20528v1
    archive_url: http://web.archive.org/web/20250303032939/https://arxiv.org/html/2502.20528v1
    year: '2025'
    authors: Multiple authors
    venue: arXiv preprint
    notes: First scalable deployment of a typosquatting detection system that addresses key limitations by leveraging package metadata. Improved neighbor search speeds by 73-91% and reduced false positives by 70.4% compared to prior work. Being used in production, contributing to removal of 3,658 typosquatting threats in one month.
    ids:
      arxiv: '2502.20528'
  - title: 'Dependency Confusion: How I Hacked Into Apple, Microsoft and Dozens of Other Companies'
    url: https://medium.com/@alex.birsan/dependency-confusion-4a5d60fec610
    archive_url: http://web.archive.org/web/20260111211113/https://medium.com/@alex.birsan/dependency-confusion-4a5d60fec610
    year: '2021'
    authors: Alex Birsan
    venue: Medium blog post / Security research
    notes: Revealed dependency confusion attack that exploits package managers pulling higher-versioned packages from public repositories when private packages exist with the same name. Successfully compromised over 35 major companies including Microsoft, Apple, PayPal, Shopify, Netflix, and Tesla. Awarded over $130,000 in bug bounties.
  - title: 'Many Hands Make Light Work: An LLM-based Multi-Agent System for Detecting Malicious PyPI Packages'
    url: https://arxiv.org/abs/2601.12148
    year: '2026'
    authors: Muhammad Umar Zeshan, Motunrayo Ibiyo, Claudio Di Sipio, Phuong T. Nguyen, Davide Di Ruscio
    venue: Journal of Systems and Software
    notes: Presents LAMPS, a multi-agent system that routes PyPI package code through specialised LLM agents for static, behavioural, and metadata analysis, then aggregates their findings. Targets the semantic patterns that single-pass rule-based scanners miss.
    ids:
      arxiv: '2601.12148'
      doi: 10.1016/j.jss.2026.112792
  - title: 'Cutting the Gordian Knot: Detecting Malicious PyPI Packages via a Knowledge-Mining Framework'
    url: https://arxiv.org/abs/2601.16463
    year: '2026'
    authors: Wenbo Guo, Chengwei Liu, Ming Kang, Yiran Zhang, Jiahui Wu, Zhengzi Xu, Vinay Sachidananda, Yang Liu
    venue: arXiv preprint
    notes: Reports that existing PyPI malware detectors flag 15-30% of legitimate packages as malicious because they rely on syntactic rules over API calls without considering context. Proposes PyGuard, which mines a knowledge base linking API patterns to their typical legitimate uses and flags only deviations.
    ids:
      arxiv: '2601.16463'
      doi: 10.48550/arxiv.2601.16463
  - title: 'Cryptographic Registry Provenance: Structural Defense Against Dependency Confusion in AI Package Ecosystems'
    url: https://arxiv.org/abs/2605.03309
    year: '2026'
    authors: Alan L. McCann
    venue: arXiv preprint
    notes: Argues every existing dependency confusion defense is configuration-based and fails silently when misconfigured. Proposes that every registry hold an Ed25519 keypair and sign every artifact it distributes, with a dual-signature model recording which registry actually served a package so installs can be audited after the fact.
    ids:
      arxiv: '2605.03309'
      doi: 10.48550/arxiv.2605.03309
  - title: 'Unveiling Malicious Logic: Towards a Statement-Level Taxonomy and Dataset for Securing Python Packages'
    url: https://arxiv.org/abs/2512.12559
    year: '2025'
    authors: Ahmed Ryan, Junaid Mansur Ifti, Md Erfan, Akond Ashfaque Ur Rahman, Md Rayhanur Rahman
    venue: arXiv preprint
    notes: Existing malicious-package datasets (pypi-malregistry, DataDog, OpenSSF, MalwareBench) label whole packages as malicious or benign and don't say which statements implement the malicious behaviour. Introduces a statement-level taxonomy and a manually annotated dataset so detectors can be trained and evaluated at the granularity attackers actually operate at.
    ids:
      arxiv: '2512.12559'
      doi: 10.48550/arxiv.2512.12559
