      doi: 10.1109/ICSE.2019.00068
  - title: 'Hero: On the chaos when path meets modules'
    url: https://dl.acm.org/doi/10.1109/ICSE43902.2021.00022
    year: '2021'
    authors: Ying Wang, Liang Qiao, Chang Xu, Yepang Liu, Shing-Chi Cheung, Na Meng, Hai Yu, Zhiliang Zhu
    venue: IEEE/ACM International Conference on Software Engineering (ICSE)
    notes: 'Studies conflicts in Go ecosystem caused by coexistence of two library referencing modes: GOPATH and Go modules.'
    ids:
      doi: 10.1109/ICSE43902.2021.00022
  - title: 'Stork: Secure Package Management For VM Environments'
    url: https://www.cs.arizona.edu/sites/default/files/TR08-04.pdf
    archive_url: http://web.archive.org/web/20250320005134/https://cs.arizona.edu/sites/default/files/TR08-04.pdf
    year: '2008'
    authors: Justin Cappos
    venue: Dissertation (University of Arizona) -- Chapter 3.8
    notes: Describes backtracking dependency resolution.  In contrast to more mathematically advanced techniques, this tries the best match greedily for each package and then rewinds state if there is a conflict.  Through practical use in Stork, this was found to work well for adopters, despite its simplcity.
  - title: Solving Package Management via Hypergraph Dependency Resolution
    url: https://arxiv.org/abs/2506.10803
    archive_url: http://web.archive.org/web/20251203173638/https://arxiv.org/abs/2506.10803
    year: '2025'
    authors: Ryan Gibb, Patrick Ferris, David Allsopp, Michael Winston Dales, Mark Elvers, Thomas Gazagnaire, Sadiq Jaffer, Thomas Leonard, Jon Ludlam, Anil Madhavapeddy
    venue: arXiv preprint
    notes: Introduces HyperRes, a formal framework modeling dependencies as hypergraphs to address fragmentation across package managers. Demonstrates translation of metadata between different package managers and solving dependency constraints across ecosystems without forcing users to abandon their preferred tools.
    ids:
      arxiv: '2506.10803'
  - title: Using Answer Set Programming for HPC Dependency Solving
    url: https://dl.acm.org/doi/abs/10.5555/3571885.3571931
    archive_url: http://web.archive.org/web/20240429022238/https://dl.acm.org/doi/abs/10.5555/3571885.3571931
